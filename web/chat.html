<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mental Mantra - Maya AI Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f3; height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .chat-container {
      width: 420px; height: 700px; background: white; border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12); display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }
    .chat-header {
      background: linear-gradient(135deg, #4A6B5D, #5D8A7A);
      color: white; padding: 20px 24px;
    }
    .chat-header h1 { font-size: 18px; font-weight: 600; }
    .chat-header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message {
      max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user {
      background: #4A6B5D; color: white; align-self: flex-end; border-bottom-right-radius: 4px;
    }
    .message.bot {
      background: #f0f4f3; color: #1a1a2e; align-self: flex-start; border-bottom-left-radius: 4px;
    }
    .message.bot .typing { display: inline-flex; gap: 4px; }
    .message.bot .typing span {
      width: 8px; height: 8px; background: #4A6B5D; border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .message.bot .typing span:nth-child(2) { animation-delay: 0.2s; }
    .message.bot .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); }
      40% { transform: scale(1); }
    }
    .input-area {
      padding: 16px 20px; border-top: 1px solid #e8eceb; display: flex; gap: 10px; background: white;
    }
    .input-area input {
      flex: 1; border: 2px solid #e8eceb; border-radius: 12px; padding: 10px 16px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #4A6B5D; }
    .input-area button {
      background: #4A6B5D; color: white; border: none; border-radius: 12px;
      width: 44px; height: 44px; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .input-area button:hover { background: #3d5a4e; }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-bar {
      padding: 8px 20px; font-size: 11px; color: #888; text-align: center;
      background: #fafafa; border-top: 1px solid #e8eceb;
    }
    .status-bar.error { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>Maya</h1>
      <p>Your AI wellness companion</p>
    </div>
    <div class="messages" id="messages">
      <div class="message bot">Hi, I'm Maya. I'm here to listen and support you. How are you feeling today?</div>
    </div>
    <div class="input-area">
      <input type="text" id="input" placeholder="Type a message..." autofocus>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="status-bar" id="status">Connected via Gemini</div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api/ai';

    async function sendMessage() {
      const input = document.getElementById('input');
      const msg = input.value.trim();
      if (!msg) return;

      input.value = '';
      addMessage(msg, 'user');
      showTyping();

      try {
        const res = await fetch(API_URL + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg }),
        });
        const data = await res.json();
        removeTyping();
        if (data.success) {
          addMessage(data.reply, 'bot');
        } else {
          addMessage('Error: ' + data.message, 'bot');
        }
      } catch (err) {
        removeTyping();
        addMessage('Connection error. Is the backend running on port 3000?', 'bot');
        setStatus('Cannot reach backend', 'error');
      }
    }

    function addMessage(text, sender) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message ' + sender;
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing';
      div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      document.getElementById('sendBtn').disabled = true;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
      document.getElementById('sendBtn').disabled = false;
    }

    function setStatus(text, type) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status-bar' + (type ? ' ' + type : '');
    }

    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
