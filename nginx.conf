worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/json;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  server {
    listen 80;
    server_name api.mentalmantra.app localhost;
    return 301 https://$server_name$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name api.mentalmantra.app;

    # SSL - replace with actual cert paths
    ssl_certificate /etc/ssl/certs/mentalmantra.crt;
    ssl_certificate_key /etc/ssl/private/mentalmantra.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend API proxy
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 90s;

      # CORS
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
      add_header Access-Control-Allow-Credentials "true" always;

      if ($request_method = OPTIONS) {
        return 204;
      }
    }

    # Auth rate limited separately
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api:3000;
    }

    # Health check
    location /health {
      proxy_pass http://api:3000/health;
    }

    # WebSocket support for Socket.IO
    location /socket.io/ {
      proxy_pass http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 86400s;
    }

    # Static files
    location /static/ {
      alias /app/static/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }
}
