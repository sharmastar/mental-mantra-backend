name: mental_mantra
description: "Mental Mantra - AI-powered personalized mental wellness platform"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State & Routing ──────────────────────────────────────────────
  flutter_riverpod: ^2.4.9
  go_router: ^14.2.0

  # ── Networking ───────────────────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.0.3

  # ── Storage ──────────────────────────────────────────────────────
  flutter_secure_storage: ^10.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # ── Authentication ───────────────────────────────────────────────
  google_sign_in: ^6.2.1
  local_auth: ^2.3.0
  sign_in_with_apple: ^6.1.0

  # ── UI & Animation ───────────────────────────────────────────────
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0
  flutter_markdown: ^0.7.4

  # ── Media ────────────────────────────────────────────────────────
  audioplayers: ^6.1.0
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  youtube_player_iframe: ^5.1.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

  # ── Notifications ────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0

  # ── PDF / Export ─────────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2

  # ── Utils ────────────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  device_info_plus: ^11.1.0
  uuid: ^4.5.0
  crypto: ^3.0.5
  equatable: ^2.0.5
  dartz: ^0.10.1
  rxdart: ^0.28.0
  logger: ^2.4.0
  cupertino_icons: ^1.0.8
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  http: ^1.6.0
  flutter_tts: ^4.2.5
  google_generative_ai: ^0.4.5
  dash_chat_2: ^0.0.21
  speech_to_text: ^7.4.0
  firebase_core: ^3.2.0
  firebase_analytics: ^11.2.0
  firebase_crashlytics: ^4.0.0
  sentry_flutter: ^8.0.0
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.14.1
  json_serializable: ^6.8.0
  freezed: ^2.5.2

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#124C4E"
    theme_color: "#124C4E"
  image_path: "assets/branding/logo_icon.png"
  adaptive_icon_background: "#124C4E"
  adaptive_icon_foreground: "assets/branding/logo_icon.png"
  adaptive_icon_monochrome: "assets/branding/logo_icon.png"
  remove_alpha_ios: true
  background_color: "#124C4E"
  foreground_color: "#FFFFFF"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/branding/logo_light.png"
  color_dark: "#121212"
  image_dark: "assets/branding/logo_dark.png"
  android: true
  ios: true
  web: false
  android_12:
    image: "assets/branding/logo_light.png"
    image_dark: "assets/branding/logo_dark.png"
    icon_background_color: "#ffffff"
    icon_background_color_dark: "#121212"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/branding/
    - assets/icons/
    - assets/hd/
    - assets/audio/
    - assets/audio/solfeggio/
    - assets/lottie/
