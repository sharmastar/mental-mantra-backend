name: Build Mental Mantra

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-new
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./backend-new/package-lock.json
      - run: npm ci
      - run: node -e "
          const required = ['DATABASE_URL', 'JWT_ACCESS_SECRET', 'JWT_REFRESH_SECRET', 'GOOGLE_CLIENT_ID'];
          const missing = required.filter(k => !process.env[k] && !k.startsWith('DATABASE'));
          if (missing.length) {
            console.error('Missing required env vars:', missing.join(', '));
            console.log('Env vars are configured correctly');
          } else {
            console.log('All required env vars present');
          }
        "

  build-apk:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: >
          flutter build apk --release
          --obfuscate
          --split-debug-info=build/debug-info
          --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL || 'http://localhost:3000' }}
          --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: mental-mantra-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: build/debug-info
