services:
  - type: web
    name: mental-mantra-api
    env: docker
    dockerContext: ./backend-new
    dockerfilePath: ./backend-new/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mental-mantra-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mental-mantra-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: PORT
        value: 3000

databases:
  - name: mental-mantra-db
    databaseName: mental_mantra_db
    user: mental_mantra_user

  - type: redis
    name: mental-mantra-redis
